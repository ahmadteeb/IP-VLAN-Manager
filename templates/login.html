<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IP/VLAN Manager</title>

    <!-- Prevent theme flash -->
    <script>
        (function() {
            try {
                var stored = localStorage.getItem('theme');
                var theme = stored === 'dark' ? 'dark' : (stored === 'light' ? 'light' : 'light');
                document.documentElement.setAttribute('data-bs-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-bs-theme', 'light');
            }
        })();
    </script>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Inter font to match app -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-grad: radial-gradient(1200px 600px at 0% 0%, rgba(99,102,241,0.18), transparent 60%),
                       radial-gradient(900px 500px at 100% 100%, rgba(236,72,153,0.15), transparent 55%),
                       linear-gradient(135deg, #0f172a 0%, #111827 100%);
        }
        html, body {
            height: 100%;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #eef2ff;
            background-image: radial-gradient(1200px 600px at 0% 0%, rgba(99,102,241,0.12), transparent 60%),
                              radial-gradient(900px 500px at 100% 100%, rgba(236,72,153,0.10), transparent 55%),
                              linear-gradient(135deg, #eff6ff 0%, #eef2ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        [data-bs-theme="dark"] body {
            background: #0b1220;
            background-image: var(--bg-grad);
        }
        .auth-wrap {
            max-width: 440px;
            width: 100%;
        }
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            color: #1f2937;
        }
        [data-bs-theme="dark"] .brand {
            color: #e5e7eb;
        }
        .brand-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 18px 30px rgba(79, 70, 229, 0.35);
        }
        .login-card {
            background: rgba(255,255,255,0.85);
            border: 1px solid rgba(226,232,240,0.7);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            box-shadow: 0 35px 60px rgba(15, 23, 42, 0.15);
            overflow: hidden;
        }
        [data-bs-theme="dark"] .login-card {
            background: rgba(17,24,39,0.75);
            border-color: rgba(148,163,184,0.18);
            box-shadow: 0 45px 70px rgba(2,6,23,0.6);
        }
        .login-header {
            padding: 1.75rem 1.75rem 0.25rem;
            text-align: center;
        }
        .login-body {
            padding: 1.75rem;
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 0.7rem 0.9rem;
        }
        .btn-primary {
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            box-shadow: 0 18px 30px rgba(79, 70, 229, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 22px 36px rgba(79, 70, 229, 0.35);
        }
        .helper {
            color: #6b7280;
        }
        [data-bs-theme="dark"] .helper {
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="brand">
            <div class="brand-icon">
                <i class="fas fa-network-wired"></i>
            </div>
            <div class="text-start">
                <h4 class="mb-0 fw-semibold">IP/VLAN Manager</h4>
                <small class="helper">Sign in to continue</small>
            </div>
        </div>
        <div class="login-card">
            <div class="login-header">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
            </div>
            <div class="login-body">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">
                            <i class="fas fa-user me-1"></i> Username
                        </label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">
                            <i class="fas fa-lock me-1"></i> Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-sign-in-alt me-1"></i> Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Load saved username when page loads
        document.addEventListener('DOMContentLoaded', function() {
            try {
                const savedUsername = localStorage.getItem('saved_username');
                if (savedUsername) {
                    const usernameInput = document.getElementById('username');
                    if (usernameInput) {
                        usernameInput.value = savedUsername;
                    }
                }
            } catch (error) {
                console.error('Error loading saved username:', error);
            }
        });

        // Save username when form is submitted
        document.querySelector('form').addEventListener('submit', function(e) {
            try {
                const usernameInput = document.getElementById('username');
                if (usernameInput && usernameInput.value.trim()) {
                    localStorage.setItem('saved_username', usernameInput.value.trim());
                }
            } catch (error) {
                console.error('Error saving username:', error);
            }
        });
    </script>
</body>
</html>
